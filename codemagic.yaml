# Final iOS Build Configuration for AgroTene
workflows:
  ios-release:
    name: Build iOS App Store
    instance_type: mac_mini_m1
    max_build_duration: 120
    environment:
      node: latest
      xcode: latest
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.agrotene.app
    integrations:
      app_store_connect: Codemagic iOS
    scripts:
      - name: Install dependencies
        script: npm install
        
      - name: Build Web Assets (Vite)
        script: npm run build
        
      - name: Sync Capacitor
        script: npx cap sync ios
        
      - name: Build iOS Workspace (Signed IPA)
        script: |
          cd ios/App
          # Listar información del proyecto para verificar IDs
          xcodebuild -list -project App.xcodeproj
          # Intentar descargar perfiles con información detallada
          xcode-project use-profiles --warn-only
          # Resolver dependencias de Swift Package Manager
          xcodebuild -resolvePackageDependencies -project App.xcodeproj -scheme App
          # Compilar el IPA
          xcode-project build-ipa --project App.xcodeproj --scheme App
          
    artifacts:
      - ios/App/build/ios/ipa/*.ipa
      
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        # Si prefieres que solo se suba pero no se mande a revisión TestFlight automáticamente, cambia a false
