# Final iOS Build Configuration for AgroTene
workflows:
  ios-release:
    name: Build iOS App Store
    instance_type: mac_mini_m1
    max_build_duration: 120
    environment:
      node: latest
      xcode: latest
    integrations:
      app_store_connect: Codemagic iOS
    scripts:
      - name: Install dependencies
        script: npm install
        
      - name: Build Web Assets (Vite)
        script: npm run build
        
      - name: Sync Capacitor
        script: npx cap sync ios
        
      - name: Build iOS Workspace (Signed IPA)
        script: |
          cd ios/App
          echo "--- DEBUG: LISTANDO DATOS DE APPLE ---"
          # Intentar listar bundle IDs para ver si la llave tiene acceso
          app-store-connect list-bundle-ids || echo "No se pudo listar Bundle IDs"
          
          echo "--- DESCARGANDO PERFILES ---"
          # Intentar descargar usando la herramienta más robusta
          app-store-connect fetch-signing-files "com.agrotene.app" --type IOS_APP_STORE --install || echo "Fallo al descargar perfiles"
          
          # Resolver dependencias
          xcodebuild -resolvePackageDependencies -project App.xcodeproj -scheme App
          
          # Compilar el IPA forzando el uso de los perfiles descargados
          xcode-project build-ipa --project App.xcodeproj --scheme App
          
    artifacts:
      - ios/App/build/ios/ipa/*.ipa
      
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        # Si prefieres que solo se suba pero no se mande a revisión TestFlight automáticamente, cambia a false
