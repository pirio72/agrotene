# Final iOS Build Configuration for AgroTene
workflows:
  ios-release:
    name: Build iOS App Store
    instance_type: mac_mini_m1
    max_build_duration: 120
    environment:
      node: latest
      xcode: latest
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.agrotene.app
    integrations:
      app_store_connect: Codemagic iOS
    scripts:
      - name: Install dependencies
        script: npm install
        
      - name: Build Web Assets (Vite)
        script: npm run build
        
      - name: Sync Capacitor
        script: npx cap sync ios
        
      - name: Build iOS Workspace (Signed IPA)
        script: |
          cd ios/App
          echo "--- DEBUG: LISTANDO DATOS DE APPLE ---"
          # Listar Bundle IDs
          app-store-connect bundle-ids list
          
          # Listar Certificados
          app-store-connect certificates list
          
          # Listar Perfiles
          app-store-connect profiles list
          
          echo "--- INTENTANDO DESCARGA MANUAL ---"
          # Intentar descargar perfiles (sin el flag --install que falló)
          app-store-connect fetch-signing-files "com.agrotene.app" --type IOS_APP_STORE
          
          # Resolver dependencias
          xcodebuild -resolvePackageDependencies -project App.xcodeproj -scheme App
          
          # Intentar compilar (esto probablemente fallará si lo anterior no funcionó, pero nos dará info)
          xcode-project build-ipa --project App.xcodeproj --scheme App
          
    artifacts:
      - ios/App/build/ios/ipa/*.ipa
      
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
