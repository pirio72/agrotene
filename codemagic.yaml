# Final iOS Build Configuration for AgroTene
workflows:
  ios-release:
    name: Build iOS App Store
    instance_type: mac_mini_m1
    max_build_duration: 120
    environment:
      node: latest
      xcode: latest
    integrations:
      app_store_connect: Codemagic iOS
    scripts:
      - name: Install dependencies
        script: npm install
        
      - name: Build Web Assets (Vite)
        script: npm run build
        
      - name: Sync Capacitor
        script: npx cap sync ios
        
      - name: Build iOS Workspace (Signed IPA)
        script: |
          cd ios/App
          echo "--- DEBUG: LISTANDO CERTIFICADOS Y PERFILES ---"
          # Listar todos los certificados disponibles para la integración
          xcode-project certificates list
          # Listar todos los perfiles disponibles para la integración
          xcode-project profiles list
          
          echo "--- INTENTANDO FIRMA ---"
          # Intentar descargar perfiles con información detallada
          xcode-project use-profiles --bundle-identifier com.agrotene.app --warn-only
          
          # Resolver dependencias
          xcodebuild -resolvePackageDependencies -project App.xcodeproj -scheme App
          
          # Compilar el IPA
          xcode-project build-ipa --project App.xcodeproj --scheme App --bundle-identifier com.agrotene.app
          
    artifacts:
      - ios/App/build/ios/ipa/*.ipa
      
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        # Si prefieres que solo se suba pero no se mande a revisión TestFlight automáticamente, cambia a false
